name: monyx
description: Offline-first hunting map app with ballistics calculations
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  # Navigation
  go_router: ^13.2.0
  # Maps
  mapbox_maps_flutter: ^2.3.0
  # Local storage / offline
  drift: ^2.18.0
  drift_flutter: ^0.2.2
  path_provider: ^2.1.3
  # HTTP
  http: ^1.2.1
  # Location
  geolocator: ^11.1.0
  # Secure storage for auth tokens
  flutter_secure_storage: ^9.0.0
  # JSON serialization
  json_annotation: ^4.9.0
  # Math / formatting
  intl: ^0.19.0
  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.3
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/
