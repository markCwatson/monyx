name: monyx
description: 'Offline hunting map + ballistics calculator'
publish_to: 'none'
version: 1.0.2+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  mapbox_maps_flutter: ^2.9.0
  geolocator: ^13.0.2
  permission_handler: ^11.4.0
  go_router: ^15.1.2
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  http: ^1.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  google_mobile_ads: ^5.3.0
  in_app_purchase: ^3.2.0
  image_picker: ^1.1.2
  tflite_flutter: ^0.11.0
  image: ^4.3.0
  uuid: ^4.5.1
  gal: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

